name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        name: Lint, build, pack, typecheck
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Build
              run: bun run build

            - name: Pack
              run: bun run pack

            - name: Typecheck
              run: bun run typecheck

            - name: Upload .rmod artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: rmods
                  path: packages/*/dist/*.rmod
                  if-no-files-found: error
